services:
  openbrain:
    build:
      context: .
      dockerfile: Dockerfile.server
    container_name: openbrain
    image: openbrain
    ports:
      - "8765:8765"
    environment:
      DATABASE_URL: postgresql://openbrain:openbrain@db:5432/openbrain
    depends_on:
      db:
        condition: service_healthy
    volumes:
      - ./src:/app/src
      - ./migrations:/app/migrations
    command: >
      uvicorn openbrain.server.app:app
      --host 0.0.0.0 --port 8765
      --reload --reload-dir /app/src

  db:
    image: pgvector/pgvector:pg16
    environment:
      POSTGRES_DB: openbrain
      POSTGRES_USER: openbrain
      POSTGRES_PASSWORD: openbrain
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U openbrain"]
      interval: 2s
      timeout: 5s
      retries: 10

volumes:
  pgdata:
