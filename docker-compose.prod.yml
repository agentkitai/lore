# Production Docker Compose for Open Brain
# Create a .env file with POSTGRES_PASSWORD=<secure-random-value>
services:
  openbrain:
    build:
      context: .
      dockerfile: Dockerfile.server
    container_name: openbrain
    image: openbrain
    ports:
      - "8765:8765"
    environment:
      DATABASE_URL: postgresql://openbrain:${POSTGRES_PASSWORD:-openbrain}@db:5432/openbrain
    depends_on:
      db:
        condition: service_healthy
    restart: unless-stopped
    deploy:
      resources:
        limits:
          memory: 512M

  db:
    image: pgvector/pgvector:pg16
    environment:
      POSTGRES_DB: openbrain
      POSTGRES_USER: openbrain
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-openbrain}
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U openbrain"]
      interval: 5s
      timeout: 5s
      retries: 10
    restart: unless-stopped

volumes:
  pgdata:
