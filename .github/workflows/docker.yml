name: Docker image (ghcr.io)

# A `v*` tag builds and pushes the server image to the GitHub Container
# Registry using the built-in GITHUB_TOKEN — no Docker Hub credentials.
# (Migrated off the personal pazgaz/lore Docker Hub repo, matching agentlens.)

on:
  push:
    tags: ['v*']
  workflow_dispatch: {}

jobs:
  build-push:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write   # push to ghcr.io
    steps:
      - uses: actions/checkout@v4

      # docker-container driver so `cache-to: type=gha` works.
      - uses: docker/setup-buildx-action@v3

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ghcr.io/agentkitai/lore
          tags: |
            type=semver,pattern={{version}}
            type=semver,pattern={{major}}.{{minor}}
            type=raw,value=latest

      - name: Build and push
        uses: docker/build-push-action@v5
        with:
          context: .
          file: Dockerfile.server
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
